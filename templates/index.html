<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Server Admin Panel</title>
</head>
<body>

    <div class="container">
        <h1>CS2 Server Admin Panel</h1>

        <div class="stats-bar">
            <div class="stat-item">Server Status: <span id="status-text" style="color: #00ff00;">Online</span></div>
            <div class="stat-item">Current Map: <span id="map-name">Loading...</span></div>
            <div class="stat-item">Players: <span id="player-count">0/0</span></div>
        </div>

        <div id="console-output">></div>

        <div class="controls">
            <input type="text" id="cmdInput" placeholder="Enter command" onkeydown="if(event.key==='Enter') sendCommand()">
            <button onclick="sendCommand()">Send</button>
            <button style="background-color: #444;" onclick="document.getElementById('console-output').innerHTML = '>'">Clear</button>
        </div>

        <div class="presets-container">
            <div class="preset-group">
                <h4>Match Control</h4>
                <button class="btn-preset" onclick="runPreset('mp_restartgame 1')">Restart Match</button>
                <button class="btn-preset" onclick="runPreset('mp_swapteams')">Swap Teams</button>
                <button class="btn-preset" onclick="runPreset('mp_pause_match')">Pause Match</button>
                <button class="btn-preset" onclick="runPreset('mp_unpause_match')">Unpause Match</button>
            </div>

            <div class="preset-group">
                <h4>Warmup</h4>
                <button class="btn-preset" onclick="runPreset('mp_warmup_start; mp_warmup_pausetimer 1')">Start Warmup</button>
                <button class="btn-preset" onclick="runPreset('mp_warmup_end')">End Warmup</button>
                <button class="btn-preset" onclick="runPreset('mp_warmup_start; mp_warmup_pausetimer 1')">Knife Only</button>
                <button class="btn-preset" onclick="runPreset('mp_warmup_end')">End Knife Only</button>
            </div>

            <div class="preset-group">
                <h4>Bots</h4>
                <button class="btn-preset" onclick="runPreset('bot_kick')">Kick Bots</button>
                <button class="btn-preset" onclick="runPreset('bot_add t')">Add Bot T</button>
                <button class="btn-preset" onclick="runPreset('bot_add ct')">Add Bot CT</button>
            </div>

            <div class="preset-group">
                <h4>Placeholder</h4>
                <button class="btn-preset" onclick="runPreset('')">Placeholder</button>
            </div>

            <div class="preset-group">
                <h4>Placeholder</h4>
                <button class="btn-preset" onclick="runPreset('')">Placeholder</button>
            </div>
        </div>
        <div class="launcher-row"> 
        <h4>Match Launcher</h4>
            <div class="launcher-controls">
                <div class="launcher-item">
                    <select id="launchMap">
                        <option value="" disabled selected hidden>Choose Map...</option>
                        <option value="de_ancient">Ancient</option>
                        <option value="de_anubis">Anubis</option>
                        <option value="de_dust2">Dust II</option>
                        <option value="de_inferno">Inferno</option>
                        <option value="de_mirage">Mirage</option>
                        <option value="de_nuke">Nuke</option>
                        <option value="de_overpass">Overpass</option>
                        <option value="de_train">Train</option>
                        <option value="de_vertigo">Vertigo</option>
                    </select>
                </div> 
                <div class="launcher-item">
                    <select id="launchMode">
                        <option value="" disabled selected hidden>Choose Mode...</option>
                        <option value="0,1">Competitive</option>
                        <option value="0,0">Casual</option>
                        <option value="1,2">Deathmatch</option>
                        <option value="1,0">Arms Race</option>
                    </select>
                </div> 
                <button class="btn-preset btn-launch" onclick="buildAndLaunch()">START MATCH</button>
            </div> 
        </div>
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</body>
</html>
