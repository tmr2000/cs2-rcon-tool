{% extends "base.html" %}

{% block title %}Map Manager{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/map_manager.css') }}">
{% endblock %}

{% block content %}
    <div class="map-manager-card">
        <h3>Add Workshop Map</h3>
        <p class="helper-text">Enter the Steam Workshop ID to import a new map.</p>
        <div class="input-group">
            <input type="text" id="wsInput" placeholder="Enter Workshop ID" onkeydown="if(event.key==='Enter') submitMap()">
            <button onclick="submitMap()">Add Map</button>
        </div>
        <div id="statusMessage"></div>
    </div>
    <div class="map-grid" id="workshopGrid">
    </div>
{% endblock %}
{% block scripts %}
    <script src="{{ url_for('static', filename='js/map_manager.js') }}" defer></script>
{% endblock %}
